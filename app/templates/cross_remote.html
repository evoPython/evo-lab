{% extends "base.html" %}

{% block title %}Cross-Remote{% endblock %}

{% block content %}

<h1>Cross-Remote</h1>
<p>Logged in as {{ me }}</p>

<h2>Online</h2>
<ul id="online-list"></ul>

<h2 id="chat-title" style="display:none;"></h2>
<div id="chat-box" style="display:none;">
  <div id="messages" style="border:1px solid gray; height:200px; overflow-y:auto; padding:4px;"></div>
  <input type="text" id="msg-input" placeholder="Message..." style="width:250px;">
  <button onclick="sendMessage()">Send</button>
  <button onclick="startCall()">Call</button>
</div>

<div id="incoming-call" style="display:none;">
  <p id="incoming-text"></p>
  <button onclick="acceptCall()">Accept</button>
  <button onclick="declineCall()">Decline</button>
</div>

<div id="call-ui" style="display:none;">
  <p>In call with <span id="call-peer"></span></p>
  <video id="local-video" autoplay muted playsinline style="max-width:150px;"></video>
  <video id="remote-video" autoplay playsinline style="max-width:300px;"></video>
  <br>
  <button onclick="endCall()">Hang up</button>
</div>

<script>
const ME = "{{ me }}";
let currentPeer = null;
let lastMsgId = 0;
let msgPoll = null;

let pc = null, localStream = null, currentCallId = null, signalPoll = null, statePoll = null, isCallee = false;

async function postJSON(url, body) {
  const res = await fetch(url, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(body || {}),
  });
  return res.json();
}

// --- Online users ---
async function loadOnline() {
  try {
    const res = await fetch("/cross-remote/api/online");
    const users = await res.json();
    const list = document.getElementById("online-list");
    list.innerHTML = "";
    users.forEach(u => {
      const li = document.createElement("li");
      li.textContent = u;
      li.style.cursor = "pointer";
      li.onclick = () => openChat(u);
      list.appendChild(li);
    });
  } catch (e) {}
}

// --- Chat ---
function openChat(user) {
  currentPeer = user;
  lastMsgId = 0;
  document.getElementById("chat-title").textContent = "Chat with " + user;
  document.getElementById("chat-title").style.display = "block";
  document.getElementById("chat-box").style.display = "block";
  document.getElementById("messages").innerHTML = "";
  if (msgPoll) clearInterval(msgPoll);
  pollMessages();
  msgPoll = setInterval(pollMessages, 2000);
}

async function pollMessages() {
  if (!currentPeer) return;
  try {
    const res = await fetch("/cross-remote/api/messages?with=" + encodeURIComponent(currentPeer) + "&since_id=" + lastMsgId);
    const msgs = await res.json();
    const box = document.getElementById("messages");
    msgs.forEach(m => {
      const p = document.createElement("p");
      p.textContent = m.sender + ": " + m.body;
      box.appendChild(p);
      lastMsgId = Math.max(lastMsgId, m.id);
    });
    if (msgs.length) box.scrollTop = box.scrollHeight;
  } catch (e) {}
}

async function sendMessage() {
  const input = document.getElementById("msg-input");
  if (!currentPeer || !input.value.trim()) return;
  await postJSON("/cross-remote/api/messages/send", {to: currentPeer, body: input.value.trim()});
  input.value = "";
  pollMessages();
}

// --- Incoming call polling (always on) ---
async function pollIncoming() {
  if (currentCallId) return; // already in/starting a call
  try {
    const res = await fetch("/cross-remote/api/call/incoming");
    const calls = await res.json();
    if (calls.length) {
      const call = calls[0];
      currentCallId = call.id;
      isCallee = true;
      document.getElementById("incoming-text").textContent = "Incoming call from " + call.caller;
      document.getElementById("incoming-call").style.display = "block";
    }
  } catch (e) {}
}

async function declineCall() {
  await postJSON("/cross-remote/api/call/decline", {call_id: currentCallId});
  document.getElementById("incoming-call").style.display = "none";
  currentCallId = null;
  isCallee = false;
}

async function acceptCall() {
  document.getElementById("incoming-call").style.display = "none";
  await postJSON("/cross-remote/api/call/accept", {call_id: currentCallId});
  await setupPeerConnection();
  pollSignals();
  watchCallState();
  showCallUI(document.getElementById("incoming-text").textContent.replace("Incoming call from ", ""));
}

// --- Outgoing call ---
async function startCall() {
  if (!currentPeer) return;
  const res = await postJSON("/cross-remote/api/call/start", {to: currentPeer});
  currentCallId = res.call_id;
  isCallee = false;
  await setupPeerConnection();

  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);
  await postJSON("/cross-remote/api/call/signal", {call_id: currentCallId, kind: "offer", data: JSON.stringify(offer)});

  pollSignals();
  watchCallState();
  showCallUI(currentPeer);
}

function showCallUI(peerName) {
  document.getElementById("call-peer").textContent = peerName;
  document.getElementById("call-ui").style.display = "block";
}

async function setupPeerConnection() {
  pc = new RTCPeerConnection({iceServers: [{urls: "stun:stun.l.google.com:19302"}]});
  localStream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
  localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
  document.getElementById("local-video").srcObject = localStream;

  pc.ontrack = (e) => {
    document.getElementById("remote-video").srcObject = e.streams[0];
  };
  pc.onicecandidate = (e) => {
    if (e.candidate) {
      postJSON("/cross-remote/api/call/signal", {
        call_id: currentCallId, kind: "candidate", data: JSON.stringify(e.candidate),
      });
    }
  };
}

async function pollSignals() {
  if (!currentCallId) return;
  let sinceId = 0;
  signalPoll = setInterval(async () => {
    if (!currentCallId) { clearInterval(signalPoll); return; }
    try {
      const res = await fetch("/cross-remote/api/call/signals?call_id=" + currentCallId + "&since_id=" + sinceId);
      const signals = await res.json();
      for (const sig of signals) {
        sinceId = Math.max(sinceId, sig.id);
        const data = JSON.parse(sig.data);
        if (sig.kind === "offer") {
          await pc.setRemoteDescription(new RTCSessionDescription(data));
          const answer = await pc.createAnswer();
          await pc.setLocalDescription(answer);
          await postJSON("/cross-remote/api/call/signal", {call_id: currentCallId, kind: "answer", data: JSON.stringify(answer)});
        } else if (sig.kind === "answer") {
          await pc.setRemoteDescription(new RTCSessionDescription(data));
        } else if (sig.kind === "candidate") {
          try { await pc.addIceCandidate(new RTCIceCandidate(data)); } catch (e) {}
        }
      }
    } catch (e) {}
  }, 1000);
}

function watchCallState() {
  statePoll = setInterval(async () => {
    if (!currentCallId) { clearInterval(statePoll); return; }
    try {
      const res = await fetch("/cross-remote/api/call/state?call_id=" + currentCallId);
      const call = await res.json();
      if (call.status === "ended" || call.status === "declined") {
        cleanupCall();
      }
    } catch (e) {}
  }, 1500);
}

async function endCall() {
  if (currentCallId) await postJSON("/cross-remote/api/call/end", {call_id: currentCallId});
  cleanupCall();
}

function cleanupCall() {
  if (pc) pc.close();
  if (localStream) localStream.getTracks().forEach(t => t.stop());
  pc = null; localStream = null; currentCallId = null; isCallee = false;
  if (signalPoll) clearInterval(signalPoll);
  if (statePoll) clearInterval(statePoll);
  document.getElementById("call-ui").style.display = "none";
  document.getElementById("incoming-call").style.display = "none";
}

loadOnline();
setInterval(loadOnline, 5000);
setInterval(pollIncoming, 2000);
</script>

{% endblock %}
