{% extends "app_base.html" %}

{% block title %}Open URL{% endblock %}

{% block content %}
<main class="stage" id="stage">
<div class="page-shell">
  <h1>Open URL on Laptop</h1>

  {% if error %}
  <p class="error">{{ error }}</p>
  {% endif %}

  {% if result %}
  <p>Opened: {{ result }}</p>
  {% endif %}

  <form method="post" class="form-row">
    <input type="text" name="url" placeholder="https://example.com" style="flex: 1; min-width: 0;">
    <button type="submit" class="btn btn--primary">Open</button>
  </form>

  <a class="back-link mono" href="/tools">&larr; back to tools</a>
</div>
</main>
{% endblock %}
