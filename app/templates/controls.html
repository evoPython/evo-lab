{% extends "app_base.html" %}

{% block title %}Controls{% endblock %}

{% block content %}
<main class="stage" id="stage">
<div class="page-shell">
  <h1>Laptop Controls</h1>

  <p class="rc-status mono is-visible" id="status"></p>

  <div class="btn-row">
    <button class="btn" onclick="runAction('lock')">Lock Screen</button>
    <button class="btn" onclick="confirmAction('sleep', 'Suspend the laptop now?')">Sleep</button>
    <button class="btn btn--danger" onclick="confirmAction('restart', 'Restart the laptop now?')">Restart</button>
    <button class="btn btn--danger" onclick="confirmAction('shutdown', 'Shut down the laptop now?')">Shutdown</button>
  </div>

  <script>
function setStatus(message) {
    document.getElementById("status").textContent = message;
}

async function runAction(action) {
    setStatus("Working...");
    try {
        const res = await fetch("/controls/" + action, { method: "POST" });
        const data = await res.json();
        setStatus(data.status === "ok" ? "Done." : "Error: " + data.message);
    } catch (err) {
        setStatus("Request failed.");
    }
}

function confirmAction(action, message) {
    if (window.confirm(message)) {
        runAction(action);
    }
}
  </script>
</div>
</main>
{% endblock %}
