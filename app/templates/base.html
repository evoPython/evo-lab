<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>{% block title %}evo.ftp.sh{% endblock %}</title>

  <!-- General -->
  <meta name="description" content="{% block description %}welcome to my slice of the internet :){%endblock %}">
  <meta name="author" content="evo">
  <meta name="theme-color" content="#7c5cff">
  <meta name="color-scheme" content="dark">

  <!-- Open Graph (Discord, Facebook, LinkedIn, etc.) -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="evo.ftp.sh">
  <meta property="og:title" content="{% block og_title %}evo.ftp.sh{% endblock %}">
  <meta property="og:description" content="{% block og_description %}welcome to my slice of the internet :){% endblock %}">
  <meta property="og:url" content="{{ request.url }}">
  <meta property="og:image" content="{{ url_for('static', filename='images/pfp.png', _external=True) }}">
  <meta property="og:image:alt" content="Profile picture of evo">

  <!-- Twitter/X -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="{% block twitter_title %}evo.ftp.sh{% endblock %}">
  <meta name="twitter:description" content="{% block twitter_description %}student, programmer, musician. projects, experiments, self-hosting, and whatever i'm working on at 2am.{% endblock %}">
  <meta name="twitter:image" content="{{ url_for('static', filename='images/pfp.png', _external=True) }}">

  <link rel="canonical" href="{{ request.url }}">

  <!-- Favicon -->
  <link rel="icon" href="{{ url_for('static', filename='images/pfp.png') }}">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,500&display=swap" rel="stylesheet">

  <!-- Styles: loaded as direct <link> tags (not @import — @import
       chains are render-blocking and serial, so this used to be one
       file that itself pulled in 14 more, one after another, before
       the browser could even start painting). Same cascade order as
       the old style.css manifest, just fetched in parallel instead. -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/base/variables.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/base/reset.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/base/transitions.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/home/home.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/home/about.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/home/projects.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/home/letter.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/home/fun.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app/app-nav.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app/auth.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app/tools.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app/page-shell.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app/remote-dashboard.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app/cross-remote.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app/inbox.css') }}">
</head>
<body>
  <a class="skip-link" href="#stage">skip to content</a>

  {% block topbar %}
  <header class="topbar" style="position:fixed;top:0;left:0;right:0;z-index:100;">
    <div class="topbar__left">
      <span class="topbar__id mono">evo<span class="accent-dim">.ftp.sh</span></span>
      <span class="topbar__tagline mono dim">my slice of the internet</span>
    </div>
    <div class="topbar__right">
      <span class="topbar__greet mono" id="greet"></span>
      <span class="topbar__clock mono" id="clock"></span>
    </div>
  </header>
  {% endblock %}

  <div style="{% block content_wrap_style %}padding-top:var(--header-h);{% endblock %}">
    {% block content %}{% endblock %}
  </div>

  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
