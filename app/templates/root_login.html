{% extends "base.html" %}

{% block title %}Root Login{% endblock %}

{% block content %}

<h1>Root Login</h1>

{% if error %}
<p>Error: {{ error }}</p>
{% endif %}

<form method="post">
<input type="password" name="password" placeholder="root password" required>
<button type="submit">Log in</button>
</form>

{% endblock %}
